<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background (no rounded corners — OS applies the mask shape) -->
  <rect width="512" height="512" fill="#0a0a0b"/>
  <!-- Emoji scaled to ~60% so it stays within the maskable safe zone (80% of canvas) -->
