<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-828x1792.png" />

    <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/splash-1284x2778.png" />

    <!-- Windows / Android fallback -->
    <meta name="application-name" content="StudyLog" />
    <meta name="msapplication-TileColor" content="#0a0a0b" />
    <meta name="msapplication-TileImage" content="/icon-192x192.png" />

    <style>
      html, body { background: #0a0a0b; margin: 0; padding: 0; }
      #boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #0a0a0b;
        gap: 16px;
      }
      #boot-icon {
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #boot-icon svg { width: 55px; height: 55px; }
      #boot-name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #f9fafb;
        letter-spacing: -0.3px;
      }
      #boot-bar {
        width: 120px;
        height: 3px;
        background: #1f1f22;
        border-radius: 99px;
        overflow: hidden;
      }
      #boot-bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: #6366f1;
        border-radius: 99px;
        animation: boot-slide 1s ease-in-out infinite alternate;
      }
      @keyframes boot-slide {
        from { transform: translateX(-100%); }
        to   { transform: translateX(300%); }
      }
    </style>
  </head>
  <body style="background:#0a0a0b;margin:0">
    <script>
      (function () {
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <div id="root">
      <div id="boot">
        <div id="boot-icon">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 9 L21 11 L21 35 L7 33 Z" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round"/>
            <path d="M37 9 L23 11 L23 35 L37 33 Z" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round"/>
            <line x1="22" y1="11" x2="22" y2="35" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M7 33 Q22 37 37 33" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="22" cy="8.5" r="1.4" fill="#ffffff"/>
          </svg>
        </div>
        <span id="boot-name">StudyLog</span>
        <div id="boot-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
